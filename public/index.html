<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Kho Game Của Tôi</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game"></div>

    <script>
        EJS_player = '#game';
        EJS_core = 'gba'; 
        
        // Link "Hàng" chuẩn đuôi .gba từ GitHub của bạn
        EJS_gameUrl = 'https://raw.githubusercontent.com/ngavo020183-bot/Rom/main/1212%20-%20Super%20Mario%20Advance%204%20-%20Super%20Mario%20Bros%203%20(U)(Independent).gba';

        // Cấu hình nút bấm (Thoát, Save, Load)
        EJS_Buttons = {
            exit: true,
            saveState: true,
            loadState: true,
            fullscreen: true
        };

        // Cấu hình Tap/Cảm ứng cho điện thoại
        EJS_buttonsTransparency = 0.5; // Độ mờ nút ảo 50%
        EJS_startOnLoaded = true;      // Vào là chạy luôn
        EJS_AdUrl = '';                // Chống màn hình trắng

        // Lệnh thoát: Khi bấm Exit sẽ quay lại trang chủ
        EJS_onExit = () => {
            window.location.href = '/';
        };
    </script>
    <script src="https://www.emulatorjs.org/loader.js"></script>
</body>
</html>
